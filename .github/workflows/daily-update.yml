name: Daily Data Update
on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests pytz openpyxl lxml
          
      - name: Create data directory structure
        run: |
          mkdir -p data/house5
          mkdir -p data/dauda
          mkdir -p data/backup
          # Create empty placeholder files if they don't exist
          touch data/omnisense_270226.csv
          touch data/open-meteo-7.12S39.25E61m.csv
          
      - name: Run daily update with debug
        run: |
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Data directory contents:"
          ls -la data/
          python daily_update.py
          
      - name: Check for changes
        id: check-changes
        run: |
          git status
          if git diff --quiet && git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
          
      - name: Commit and push if changed
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "chore: auto-update Open-Meteo data [skip ci]"
          git push
