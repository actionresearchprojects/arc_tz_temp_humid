name: Daily Data Update
on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests pytz openpyxl lxml
          
      - name: Create data directory structure
        run: |
          mkdir -p data
          mkdir -p data/backup
          
      - name: Run daily update (CSV only)
        run: |
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Data directory contents:"
          ls -la data/
          echo "Running daily update to fetch Open-Meteo data..."
          python daily_update.py --csv-only 2>&1
          
      - name: Check for CSV changes
        id: check-csv-changes
        run: |
          git status
          if git diff --quiet data/open-meteo*.csv 2>/dev/null; then
            echo "csv_changed=false" >> $GITHUB_OUTPUT
            echo "No changes to Open-Meteo CSV"
          else
            echo "csv_changed=true" >> $GITHUB_OUTPUT
            echo "Open-Meteo CSV updated"
          fi
          
      - name: Commit and push CSV if changed
        if: steps.check-csv-changes.outputs.csv_changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/open-meteo*.csv
          git commit -m "chore: update Open-Meteo CSV [skip ci]"
          git push
